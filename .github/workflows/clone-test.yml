name: Clone test
run-name: "Clone ${{ inputs.version }}"

on:
  #schedule:
            # ┌───────────── minute (0-59)
            # │ ┌───────────── hour (0-23)
            # │ │ ┌───────────── day of month (1-31)
            # │ │ │ ┌───────────── month (1-12)
            # │ │ │ │ ┌───────────── day of week (0-6, Sunday=0)
            # │ │ │ │ │
            # * * * * *
  #  - cron: '17/30 * * * 1'
  workflow_dispatch:
    inputs:
      version:
        description: 'Branch or Tag to build'
        default: 'GTK3V2MAIN'
        #default: 'KensTest'
        required: true
        type: choice
        options:
          - GTK3V2MAIN
          - default
          - KensTest
      sf_user:
        description: 'Sourceforge username (expects SF_SSH_KEY secret to contain private key)'
        default: 'str0belight'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Inputs
        run: |
          SF_VERSION="${{ github.event.inputs.version || 'KensTest' }}"
          SF_USER="${{ github.event.inputs.sf_user || 'str0belight' }}"
          echo "SF_VERSION=$SF_VERSION" >> $GITHUB_ENV
          echo "SF_USER=$SF_USER" >> $GITHUB_ENV
          echo "::group::Inputs"
          for b in "version=$SF_VERSION" "sf_user=$SF_USER"; do
            echo "$b"
          done
          echo "::endgroup::"

      - name: Start ssh-agent and add key
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SF_SSH_KEY" > ~/.ssh/sourceforge_key
          chmod 600 ~/.ssh/sourceforge_key
          ssh-keyscan hg.code.sf.net >> ~/.ssh/known_hosts
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts
          eval "$(ssh-agent -a $SSH_AUTH_SOCK)"
          ssh-add ~/.ssh/sourceforge_key

      - name: Get XtrackCad source and update to desired version
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          hg clone ssh://$SF_USER@hg.code.sf.net/p/xtrkcad-fork/xtrkcad repo
          cd repo
          hg update "$SF_VERSION"

      - name: Email test
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GOOGLE_SMTP_USER }}
          password: ${{ secrets.GOOGLE_SMTP_PASS }}
          subject: Github workflow built $SF_VERSION
          to: ${{ secrets.GOOGLE_SMTP_USER }}
          from: ${{ secrets.GOOGLE_SMTP_USER }}
          body: |
            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}
            Run attempt: ${{ github.run_attempt }}
            URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

